<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Perfections Dental — Staff Login</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/glass.css" />
    <style>
      body.login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .login-wrap {
        width: 100%;
        max-width: 420px;
        padding: 40px 36px;
        animation: loginRise 0.6s var(--ease);
      }
      @keyframes loginRise {
        from { opacity: 0; transform: translateY(18px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .login-logo {
        width: 76px; height: 76px;
        margin: 0 auto 18px;
        border-radius: 22px;
        background: linear-gradient(135deg, var(--blue), var(--blue-mid));
        box-shadow: 0 12px 28px rgba(4, 80, 160, 0.35);
        display: flex; align-items: center; justify-content: center;
        overflow: hidden;
      }
      .login-logo img { width: 100%; height: 100%; object-fit: cover; }
      .login-title {
        text-align: center;
        font-family: var(--font-display);
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--blue-dark);
        margin-bottom: 2px;
      }
      .login-sub { text-align: center; color: var(--mid-gray); font-size: 0.88rem; margin-bottom: 26px; }
      .input-wrapper { position: relative; }
      .input-wrapper i.field-icon {
        position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
        color: var(--mid-gray); font-size: 0.95rem; pointer-events: none;
      }
      .input-wrapper .glass-input { padding-left: 42px; }
      .toggle-password {
        position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
        background: none; border: none; color: var(--mid-gray); cursor: pointer; font-size: 0.95rem;
      }
      .toggle-password:hover { color: var(--blue); }
      .message {
        padding: 12px 16px; border-radius: var(--radius-sm); margin-bottom: 16px;
        font-size: 0.86rem; border-left: 3px solid; display: none;
      }
      .message.show { display: block; animation: loginRise 0.3s var(--ease); }
      .error-message { background: var(--danger-light); color: var(--danger); border-left-color: var(--danger); }
      .success-message { background: var(--green-light); color: var(--green-dark); border-left-color: var(--green); }
      .login-submit { width: 100%; margin-top: 4px; padding: 13px; font-size: 0.95rem; }
      .demo-creds { margin-top: 28px; }
      .demo-creds h4 {
        font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;
        color: var(--mid-gray); text-align: center; margin-bottom: 12px; font-weight: 700;
      }
      .credential-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .credential-item {
        display: flex; align-items: center; gap: 8px; padding: 9px 10px;
        border-radius: var(--radius-sm); cursor: pointer;
        background: rgba(255,255,255,0.4); border: 1px solid var(--light-border);
        transition: all 0.2s var(--ease);
      }
      .credential-item:hover { background: rgba(255,255,255,0.75); transform: translateY(-2px); }
      .role-badge {
        width: 28px; height: 28px; border-radius: 9px; flex-shrink: 0;
        background: linear-gradient(135deg, var(--blue), var(--blue-mid));
        color: #fff; display: flex; align-items: center; justify-content: center; font-size: 0.75rem;
      }
      .role-name { font-size: 0.76rem; font-weight: 700; color: var(--dark); }
      .patient-portal-link {
        display: block; text-align: center; margin-top: 22px; font-size: 0.85rem;
        color: var(--blue); text-decoration: none; font-weight: 600;
      }
      .patient-portal-link:hover { text-decoration: underline; }
      .loading-overlay {
        position: fixed; inset: 0; background: rgba(253,250,245,0.9);
        backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center;
        z-index: 999; transition: opacity 0.3s, visibility 0.3s;
      }
      .loading-overlay.hide { opacity: 0; visibility: hidden; pointer-events: none; }
      .loading-spinner {
        width: 38px; height: 38px; border: 4px solid var(--light-border);
        border-top-color: var(--blue); border-radius: 50%;
        animation: spin 0.8s linear infinite; margin: 0 auto 12px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body class="glass-app login-page">
    <div class="glass-mesh"><span></span><span></span><span></span></div>

    <div class="loading-overlay hide" id="loadingOverlay">
      <div style="text-align:center">
        <div class="loading-spinner"></div>
        <div style="color:var(--mid-gray); font-size:0.85rem;">Signing in…</div>
      </div>
    </div>

    <div class="login-wrap glass-strong">
      <div class="login-logo">
        <img src="assets/logo.png" alt="Perfections Dental" onerror="this.style.display='none'" />
      </div>
      <div class="login-title">Perfections Dental</div>
      <div class="login-sub">Staff sign in</div>

      <div id="errorMessage" class="message error-message"></div>
      <div id="successMessage" class="message success-message"></div>

      <form id="loginForm">
        <div class="glass-field">
          <label>Email address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope field-icon"></i>
            <input type="email" id="email" class="glass-input" placeholder="you@perfectionsdental.ng" required />
          </div>
        </div>
        <div class="glass-field">
          <label>Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock field-icon"></i>
            <input type="password" id="password" class="glass-input" placeholder="••••••••" required />
            <button type="button" class="toggle-password" onclick="togglePassword()">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="glass-btn glass-btn-primary login-submit">
          <i class="fas fa-right-to-bracket"></i> Sign In
        </button>
      </form>

      <div class="demo-creds">
        <h4>Demo Accounts — password 1234</h4>
        <div class="credential-grid">
          <div class="credential-item" data-email="admin@perfectionsdental.ng">
            <div class="role-badge"><i class="fas fa-user-shield"></i></div>
            <div class="role-name">Superadmin</div>
          </div>
          <div class="credential-item" data-email="doctor@perfectionsdental.ng">
            <div class="role-badge"><i class="fas fa-user-doctor"></i></div>
            <div class="role-name">Doctor</div>
          </div>
          <div class="credential-item" data-email="nurse@perfectionsdental.ng">
            <div class="role-badge"><i class="fas fa-user-nurse"></i></div>
            <div class="role-name">Nurse</div>
          </div>
          <div class="credential-item" data-email="reception@perfectionsdental.ng">
            <div class="role-badge"><i class="fas fa-desk"></i></div>
            <div class="role-name">Reception</div>
          </div>
        </div>
      </div>

      <a class="patient-portal-link" href="/pages/patient/login.html">
        <i class="fas fa-tooth"></i> Are you a patient? Sign in to the Patient Portal
      </a>
    </div>

    <script src="js/auth.js"></script>
  </body>
</html>
