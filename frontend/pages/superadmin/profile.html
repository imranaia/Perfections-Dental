<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>My Profile — Perfections Dental</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/glass.css" />
    <style>
      .page-head h1 { font-family: var(--font-display); font-size: 1.4rem; color: var(--blue-dark); margin: 0 0 20px; }
      .profile-header { display: flex; align-items: center; gap: 18px; margin-bottom: 20px; }
      .avatar-lg { width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(135deg,var(--blue),var(--blue-mid)); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.4rem; }
      .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
      .session-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed var(--light-border); font-size: 0.82rem; }
    </style>
  </head>
  <body class="glass-app">
    <div class="glass-mesh"><span></span><span></span><span></span></div>

    <div class="glass-shell">
      <aside class="glass-sidebar glass">
        <a class="glass-brand" href="dashboard.html">
          <div class="glass-brand-mark"><img src="/assets/logo.png" onerror="this.style.display='none'" /></div>
          <div class="glass-brand-words"><strong>Perfections Dental</strong><small>Services Limited</small></div>
        </a>
        <a class="glass-nav-link" href="dashboard.html"><i class="fas fa-gauge"></i> Dashboard</a>
        <a class="glass-nav-link" href="doctors.html"><i class="fas fa-user-doctor"></i> Doctors</a>
        <a class="glass-nav-link" href="nurses.html"><i class="fas fa-user-nurse"></i> Nurses</a>
        <a class="glass-nav-link" href="reception.html"><i class="fas fa-bell-concierge"></i> Reception Staff</a>
        <a class="glass-nav-link" href="services.html"><i class="fas fa-tooth"></i> Services</a>
        <a class="glass-nav-link" href="inventory.html"><i class="fas fa-boxes-stacked"></i> Inventory</a>
        <a class="glass-nav-link" href="financial.html"><i class="fas fa-sack-dollar"></i> Financial</a>
        <a class="glass-nav-link" href="analytics.html"><i class="fas fa-chart-pie"></i> Analytics</a>
        <a class="glass-nav-link" href="performance.html"><i class="fas fa-ranking-star"></i> Performance</a>
        <a class="glass-nav-link" href="access-control.html"><i class="fas fa-shield-halved"></i> Access Control</a>
        <a class="glass-nav-link" href="settings.html"><i class="fas fa-gear"></i> Settings</a>
        <a class="glass-nav-link" href="edit-landing.html"><i class="fas fa-pen-to-square"></i> Edit Landing Page</a>
        <div style="flex:1"></div>
        <a class="glass-nav-link active" href="profile.html"><i class="fas fa-user"></i> Profile</a>
        <a class="glass-nav-link" id="logoutBtn" href="#"><i class="fas fa-right-from-bracket"></i> Sign Out</a>
      </aside>

      <main class="glass-main">
        <div class="page-head"><h1>My Profile</h1></div>

        <div class="glass-grid glass-grid-2">
          <div class="glass-card">
            <div class="profile-header">
              <div class="avatar-lg" id="avatarInitials">–</div>
              <div><h3 id="profileName" style="margin:0;">–</h3><p id="profileRole" style="margin:2px 0 0;"></p></div>
            </div>
            <div class="form-row-2">
              <div class="glass-field"><label>First name</label><input id="f_first_name" class="glass-input" /></div>
              <div class="glass-field"><label>Last name</label><input id="f_last_name" class="glass-input" /></div>
            </div>
            <div class="glass-field"><label>Phone</label><input id="f_phone" class="glass-input" /></div>
            <div class="form-row-2">
              <div class="glass-field"><label>Emergency contact name</label><input id="f_ec_name" class="glass-input" /></div>
              <div class="glass-field"><label>Emergency contact phone</label><input id="f_ec_phone" class="glass-input" /></div>
            </div>
            <button class="glass-btn glass-btn-primary" id="saveBtn"><i class="fas fa-check"></i> Save Changes</button>
            <div id="saveMessage" style="margin-top:10px; font-size:0.85rem;"></div>
          </div>

          <div class="glass-card">
            <h3><i class="fas fa-lock"></i> Change Password</h3>
            <div class="glass-field" style="margin-top:12px;"><label>Current password</label><input type="password" id="currentPassword" class="glass-input" /></div>
            <div class="glass-field"><label>New password</label><input type="password" id="newPassword" class="glass-input" /></div>
            <button class="glass-btn glass-btn-ghost" id="changePassBtn"><i class="fas fa-key"></i> Update Password</button>
            <div id="passMessage" style="margin-top:10px; font-size:0.85rem;"></div>

            <h3 style="margin-top:24px;"><i class="fas fa-desktop"></i> Active Sessions</h3>
            <div id="sessionList" style="margin-top:10px;"></div>
          </div>
        </div>
      </main>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/role-switch.js"></script>
    <script>
      const API = '/api/superadmin/profile';
      async function api(path, options = {}) {
        const res = await fetch(API + path, {
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          ...options,
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        return data;
      }

      document.getElementById('logoutBtn').addEventListener('click', async (e) => { e.preventDefault(); await logout(); });

      async function loadProfile() {
        const { profile: p } = await api('/');
        document.getElementById('avatarInitials').textContent = p.avatar || p.initials || '';
        document.getElementById('profileName').textContent = p.full_name || `${p.first_name || ''} ${p.last_name || ''}`;
        document.getElementById('profileRole').textContent = p.employee_id || '';
        document.getElementById('f_first_name').value = p.first_name || '';
        document.getElementById('f_last_name').value = p.last_name || '';
        document.getElementById('f_phone').value = p.phone || '';
        document.getElementById('f_ec_name').value = p.emergency_contact?.name || '';
        document.getElementById('f_ec_phone').value = p.emergency_contact?.phone || '';

        document.getElementById('sessionList').innerHTML = (p.active_sessions || []).map(s => `
          <div class="session-row"><span>${s.device || 'Unknown'} · ${s.location || ''}</span><span>${s.is_current ? 'This device' : s.last_active}</span></div>
        `).join('') || '<div class="glass-empty"><i class="fas fa-desktop"></i>No sessions</div>';
      }

      document.getElementById('saveBtn').addEventListener('click', async () => {
        const msg = document.getElementById('saveMessage');
        try {
          await api('/', {
            method: 'PUT',
            body: JSON.stringify({
              first_name: document.getElementById('f_first_name').value.trim(),
              last_name: document.getElementById('f_last_name').value.trim(),
              phone: document.getElementById('f_phone').value.trim(),
              emergency_contact_name: document.getElementById('f_ec_name').value.trim(),
              emergency_contact_phone: document.getElementById('f_ec_phone').value.trim(),
            }),
          });
          msg.style.color = 'var(--green-dark)';
          msg.textContent = 'Profile updated!';
          loadProfile();
        } catch (e) {
          msg.style.color = 'var(--danger)';
          msg.textContent = e.message;
        }
      });

      document.getElementById('changePassBtn').addEventListener('click', async () => {
        const msg = document.getElementById('passMessage');
        try {
          await api('/change-password', {
            method: 'POST',
            body: JSON.stringify({
              current_password: document.getElementById('currentPassword').value,
              new_password: document.getElementById('newPassword').value,
            }),
          });
          msg.style.color = 'var(--green-dark)';
          msg.textContent = 'Password updated!';
          document.getElementById('currentPassword').value = '';
          document.getElementById('newPassword').value = '';
        } catch (e) {
          msg.style.color = 'var(--danger)';
          msg.textContent = e.message;
        }
      });

      async function init() {
        const user = await checkAuth();
        if (!user) return;
        await loadProfile();
      }
      init();
    </script>
  </body>
</html>
