<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Inventory — Perfections Dental</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/glass.css" />
    <style>
      .page-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
      .page-head h1 { font-family: var(--font-display); font-size: 1.4rem; color: var(--blue-dark); margin: 0; }
      .close-modal-btn { background: none; border: none; font-size: 1.2rem; color: var(--mid-gray); cursor: pointer; }
      .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
      .stock-bar { width: 80px; height: 6px; border-radius: 3px; background: var(--light-border); overflow: hidden; }
      .stock-bar-fill { height: 100%; }
    </style>
  </head>
  <body class="glass-app">
    <div class="glass-mesh"><span></span><span></span><span></span></div>

    <div class="glass-shell">
      <aside class="glass-sidebar glass">
        <a class="glass-brand" href="dashboard.html">
          <div class="glass-brand-mark"><img src="/assets/logo.png" onerror="this.style.display='none'" /></div>
          <div class="glass-brand-words"><strong>Perfections Dental</strong><small>Services Limited</small></div>
        </a>
        <a class="glass-nav-link" href="dashboard.html"><i class="fas fa-gauge"></i> Dashboard</a>
        <a class="glass-nav-link" href="doctors.html"><i class="fas fa-user-doctor"></i> Doctors</a>
        <a class="glass-nav-link" href="nurses.html"><i class="fas fa-user-nurse"></i> Nurses</a>
        <a class="glass-nav-link" href="reception.html"><i class="fas fa-bell-concierge"></i> Reception Staff</a>
        <a class="glass-nav-link" href="services.html"><i class="fas fa-tooth"></i> Services</a>
        <a class="glass-nav-link active" href="inventory.html"><i class="fas fa-boxes-stacked"></i> Inventory</a>
        <a class="glass-nav-link" href="financial.html"><i class="fas fa-sack-dollar"></i> Financial</a>
        <a class="glass-nav-link" href="analytics.html"><i class="fas fa-chart-pie"></i> Analytics</a>
        <a class="glass-nav-link" href="performance.html"><i class="fas fa-ranking-star"></i> Performance</a>
        <a class="glass-nav-link" href="access-control.html"><i class="fas fa-shield-halved"></i> Access Control</a>
        <a class="glass-nav-link" href="settings.html"><i class="fas fa-gear"></i> Settings</a>
        <div style="flex:1"></div>
        <a class="glass-nav-link" href="profile.html"><i class="fas fa-user"></i> Profile</a>
        <a class="glass-nav-link" id="logoutBtn" href="#"><i class="fas fa-right-from-bracket"></i> Sign Out</a>
      </aside>

      <main class="glass-main">
        <div class="page-head">
          <h1>Inventory</h1>
          <button class="glass-btn glass-btn-primary" id="newBtn"><i class="fas fa-plus"></i> New Item</button>
        </div>

        <div class="glass-grid glass-grid-3" style="margin-bottom:20px;">
          <div class="glass-card glass-stat"><div class="glass-stat-icon"><i class="fas fa-boxes-stacked"></i></div><div><div class="glass-stat-num" id="statTotal">–</div><div class="glass-stat-label">Total Items</div></div></div>
          <div class="glass-card glass-stat"><div class="glass-stat-icon red"><i class="fas fa-triangle-exclamation"></i></div><div><div class="glass-stat-num" id="statLow">–</div><div class="glass-stat-label">Low Stock</div></div></div>
          <div class="glass-card glass-stat"><div class="glass-stat-icon gold"><i class="fas fa-calendar-xmark"></i></div><div><div class="glass-stat-num" id="statExpiring">–</div><div class="glass-stat-label">Expiring Soon</div></div></div>
        </div>

        <div class="glass-card">
          <div class="glass-table-wrap">
            <table class="glass-table">
              <thead><tr><th>Item</th><th>Category</th><th>Stock</th><th>Price</th><th>Status</th><th></th></tr></thead>
              <tbody id="rows"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <div class="glass-modal-backdrop" id="modalBackdrop" style="display:none;">
      <div class="glass-modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
          <h3 style="margin:0;" id="modalTitle"><i class="fas fa-plus"></i> New Item</h3>
          <button class="close-modal-btn" id="closeModalBtn"><i class="fas fa-xmark"></i></button>
        </div>
        <input type="hidden" id="editId" />
        <div class="glass-field"><label>Name</label><input id="f_name" class="glass-input" /></div>
        <div class="form-row-2">
          <div class="glass-field"><label>Category</label><input id="f_category" class="glass-input" /></div>
          <div class="glass-field"><label>Unit</label><input id="f_unit" class="glass-input" placeholder="tablet, bottle…" /></div>
        </div>
        <div class="form-row-2">
          <div class="glass-field"><label>Price (₦)</label><input type="number" id="f_price" class="glass-input" /></div>
          <div class="glass-field"><label>Current stock</label><input type="number" id="f_stock" class="glass-input" /></div>
        </div>
        <div class="form-row-2">
          <div class="glass-field"><label>Min threshold</label><input type="number" id="f_threshold" class="glass-input" value="10" /></div>
          <div class="glass-field"><label>Max stock</label><input type="number" id="f_max" class="glass-input" value="100" /></div>
        </div>
        <div class="glass-field"><label>Manufacturer</label><input id="f_manufacturer" class="glass-input" /></div>
        <button class="glass-btn glass-btn-primary" id="saveBtn" style="width:100%;"><i class="fas fa-check"></i> Save Item</button>
        <div id="formMessage" style="margin-top:10px; font-size:0.85rem;"></div>
      </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script>
      const API = '/api/superadmin/inventory';
      async function api(path, options = {}) {
        const res = await fetch(API + path, {
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          ...options,
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        return data;
      }

      document.getElementById('logoutBtn').addEventListener('click', async (e) => { e.preventDefault(); await logout(); });

      let allItems = [];

      async function loadStats() {
        const { stats } = await api('/stats');
        document.getElementById('statTotal').textContent = stats.total_items ?? 0;
        document.getElementById('statLow').textContent = stats.low_stock ?? 0;
        document.getElementById('statExpiring').textContent = stats.expiring_soon ?? 0;
      }

      async function loadItems() {
        const { items } = await api('/');
        allItems = items;
        document.getElementById('rows').innerHTML = items.length ? items.map(it => {
          const pct = it.stock_percentage ?? Math.min(100, Math.round((it.stock / (it.threshold * 3 || 1)) * 100));
          const barColor = it.stock_status === 'danger' ? 'var(--danger)' : it.stock_status === 'warning' ? 'var(--gold)' : 'var(--green)';
          return `
          <tr>
            <td><div style="font-weight:700;">${it.name}</div><div style="font-size:0.75rem;color:var(--mid-gray);">${it.manufacturer || ''}</div></td>
            <td>${it.category || '—'}</td>
            <td><div>${it.stock} ${it.unit}</div><div class="stock-bar"><div class="stock-bar-fill" style="width:${pct}%;background:${barColor};"></div></div></td>
            <td>₦${(it.price ?? 0).toLocaleString()}</td>
            <td><span class="glass-badge ${it.stock_status === 'success' || it.stock_status === 'good' ? 'success' : it.stock_status === 'warning' ? 'warning' : 'danger'}">${it.expiry_status || 'in stock'}</span></td>
            <td><button class="glass-btn glass-btn-ghost edit-btn" data-id="${it.id}" style="padding:6px 12px;"><i class="fas fa-pen"></i></button></td>
          </tr>`;
        }).join('') : '<tr><td colspan="6" style="text-align:center;color:var(--mid-gray);padding:30px;">No items found</td></tr>';

        document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', () => openEdit(btn.dataset.id)));
      }

      const modal = document.getElementById('modalBackdrop');
      function resetForm() {
        ['name', 'category', 'unit', 'price', 'stock', 'manufacturer'].forEach(f => document.getElementById('f_' + f).value = '');
        document.getElementById('f_threshold').value = 10;
        document.getElementById('f_max').value = 100;
        document.getElementById('editId').value = '';
      }

      document.getElementById('newBtn').addEventListener('click', () => {
        resetForm();
        document.getElementById('modalTitle').innerHTML = '<i class="fas fa-plus"></i> New Item';
        modal.style.display = 'flex';
      });
      document.getElementById('closeModalBtn').addEventListener('click', () => { modal.style.display = 'none'; });

      function openEdit(id) {
        const it = allItems.find(x => String(x.id) === String(id));
        if (!it) return;
        resetForm();
        document.getElementById('editId').value = id;
        document.getElementById('f_name').value = it.name;
        document.getElementById('f_category').value = it.category || '';
        document.getElementById('f_unit').value = it.unit || '';
        document.getElementById('f_price').value = it.price;
        document.getElementById('f_stock').value = it.stock;
        document.getElementById('f_threshold').value = it.threshold ?? 10;
        document.getElementById('f_max').value = it.max_stock ?? 100;
        document.getElementById('f_manufacturer').value = it.manufacturer || '';
        document.getElementById('modalTitle').innerHTML = '<i class="fas fa-pen"></i> Edit Item';
        modal.style.display = 'flex';
      }

      document.getElementById('saveBtn').addEventListener('click', async () => {
        const msg = document.getElementById('formMessage');
        const id = document.getElementById('editId').value;
        const payload = {
          name: document.getElementById('f_name').value.trim(),
          category: document.getElementById('f_category').value.trim(),
          unit: document.getElementById('f_unit').value.trim(),
          price: Number(document.getElementById('f_price').value) || 0,
          stock: Number(document.getElementById('f_stock').value) || 0,
          threshold: Number(document.getElementById('f_threshold').value) || 10,
          max_stock: Number(document.getElementById('f_max').value) || 100,
          manufacturer: document.getElementById('f_manufacturer').value.trim(),
        };
        try {
          if (id) {
            await api(`/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
          } else {
            await api('/', { method: 'POST', body: JSON.stringify(payload) });
          }
          msg.style.color = 'var(--green-dark)';
          msg.textContent = 'Saved!';
          setTimeout(async () => { modal.style.display = 'none'; msg.textContent = ''; await Promise.all([loadItems(), loadStats()]); }, 600);
        } catch (e) {
          msg.style.color = 'var(--danger)';
          msg.textContent = e.message;
        }
      });

      async function init() {
        const user = await checkAuth();
        if (!user) return;
        await Promise.all([loadStats(), loadItems()]);
      }
      init();
    </script>
  </body>
</html>
