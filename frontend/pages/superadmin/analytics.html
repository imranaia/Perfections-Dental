<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Analytics — Perfections Dental</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/glass.css" />
    <style>
      .page-head h1 { font-family: var(--font-display); font-size: 1.4rem; color: var(--blue-dark); margin: 0 0 20px; }
      .list-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--light-border); font-size: 0.86rem; }
      .list-row:last-child { border-bottom: none; }
      .bar-track { flex: 1; height: 8px; border-radius: 4px; background: var(--light-border); margin: 0 10px; overflow: hidden; }
      .bar-track-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--green)); }
    </style>
  </head>
  <body class="glass-app">
    <div class="glass-mesh"><span></span><span></span><span></span></div>

    <div class="glass-shell">
      <aside class="glass-sidebar glass">
        <a class="glass-brand" href="dashboard.html">
          <div class="glass-brand-mark"><img src="/assets/logo.png" onerror="this.style.display='none'" /></div>
          <div class="glass-brand-words"><strong>Perfections Dental</strong><small>Superadmin</small></div>
        </a>
        <a class="glass-nav-link" href="dashboard.html"><i class="fas fa-gauge"></i> Dashboard</a>
        <a class="glass-nav-link" href="doctors.html"><i class="fas fa-user-doctor"></i> Doctors</a>
        <a class="glass-nav-link" href="nurses.html"><i class="fas fa-user-nurse"></i> Nurses</a>
        <a class="glass-nav-link" href="reception.html"><i class="fas fa-desk"></i> Reception Staff</a>
        <a class="glass-nav-link" href="services.html"><i class="fas fa-tooth"></i> Services</a>
        <a class="glass-nav-link" href="inventory.html"><i class="fas fa-boxes-stacked"></i> Inventory</a>
        <a class="glass-nav-link" href="financial.html"><i class="fas fa-sack-dollar"></i> Financial</a>
        <a class="glass-nav-link active" href="analytics.html"><i class="fas fa-chart-pie"></i> Analytics</a>
        <a class="glass-nav-link" href="performance.html"><i class="fas fa-ranking-star"></i> Performance</a>
        <a class="glass-nav-link" href="access-control.html"><i class="fas fa-shield-halved"></i> Access Control</a>
        <a class="glass-nav-link" href="settings.html"><i class="fas fa-gear"></i> Settings</a>
        <div style="flex:1"></div>
        <a class="glass-nav-link" href="profile.html"><i class="fas fa-user"></i> Profile</a>
        <a class="glass-nav-link" id="logoutBtn" href="#"><i class="fas fa-right-from-bracket"></i> Sign Out</a>
      </aside>

      <main class="glass-main">
        <div class="page-head"><h1>Analytics</h1></div>

        <div class="glass-grid glass-grid-4" style="margin-bottom:20px;">
          <div class="glass-card glass-stat"><div class="glass-stat-icon"><i class="fas fa-users"></i></div><div><div class="glass-stat-num" id="statPatients">–</div><div class="glass-stat-label">Total Patients</div></div></div>
          <div class="glass-card glass-stat"><div class="glass-stat-icon green"><i class="fas fa-user-plus"></i></div><div><div class="glass-stat-num" id="statNew">–</div><div class="glass-stat-label">New Patients</div></div></div>
          <div class="glass-card glass-stat"><div class="glass-stat-icon gold"><i class="fas fa-star"></i></div><div><div class="glass-stat-num" id="statRating">–</div><div class="glass-stat-label">Avg. Rating</div></div></div>
          <div class="glass-card glass-stat"><div class="glass-stat-icon"><i class="fas fa-syringe"></i></div><div><div class="glass-stat-num" id="statProcedures">–</div><div class="glass-stat-label">Total Procedures</div></div></div>
        </div>

        <div class="glass-grid glass-grid-2">
          <div class="glass-card">
            <h3><i class="fas fa-clock"></i> Peak Hours</h3>
            <div id="peakHours" style="margin-top:10px;"></div>
          </div>
          <div class="glass-card">
            <h3><i class="fas fa-people-group"></i> Patient Demographics</h3>
            <div id="demographics" style="margin-top:10px;"></div>
          </div>
        </div>

        <div class="glass-card" style="margin-top:20px;">
          <h3><i class="fas fa-list"></i> Top Treatments</h3>
          <div id="treatments" style="margin-top:10px;"></div>
        </div>
      </main>
    </div>

    <script src="/js/auth.js"></script>
    <script>
      const API = '/api/superadmin/analytics';
      async function api(path) {
        const res = await fetch(API + path, { credentials: 'include' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        return data;
      }

      document.getElementById('logoutBtn').addEventListener('click', async (e) => { e.preventDefault(); await logout(); });

      async function init() {
        const user = await checkAuth();
        if (!user) return;

        const { stats } = await api('/stats');
        document.getElementById('statPatients').textContent = stats.total_patients ?? 0;
        document.getElementById('statNew').textContent = stats.new_patients ?? 0;
        document.getElementById('statRating').textContent = stats.avg_rating ?? '–';
        document.getElementById('statProcedures').textContent = stats.total_procedures ?? 0;

        const { peak_hours } = await api('/peak-hours');
        const maxP = Math.max(...peak_hours.map(p => p.patients), 1);
        document.getElementById('peakHours').innerHTML = peak_hours.map(p => `
          <div class="list-row"><span>${p.time}</span><div class="bar-track"><div class="bar-track-fill" style="width:${(p.patients / maxP) * 100}%"></div></div><span>${p.patients}</span></div>
        `).join('');

        const { demographics, gender } = await api('/demographics');
        document.getElementById('demographics').innerHTML = `
          ${(demographics || []).map(d => `<div class="list-row"><span>${d.label}</span><div class="bar-track"><div class="bar-track-fill" style="width:${d.percent}%"></div></div><span>${d.count}</span></div>`).join('')}
          ${gender ? Object.entries(gender).map(([k, v]) => `<div class="list-row"><span>${k}</span><span>${v}%</span></div>`).join('') : ''}
        `;

        const { treatments } = await api('/treatments');
        document.getElementById('treatments').innerHTML = treatments.length ? treatments.map(t => `
          <div class="list-row"><span>${t.name || t.service_name}</span><span>${t.count ?? 0}</span></div>
        `).join('') : '<div class="glass-empty"><i class="fas fa-list"></i>No treatment data yet</div>';
      }
      init();
    </script>
  </body>
</html>
