<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Superadmin Dashboard — Perfections Dental</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/glass.css" />
    <style>
      .page-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
      .page-head h1 { font-family: var(--font-display); font-size: 1.4rem; color: var(--blue-dark); margin: 0; }
      .list-row { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--light-border); }
      .list-row:last-child { border-bottom: none; }
      .list-row-title { font-weight: 700; color: var(--dark); font-size: 0.85rem; }
      .list-row-sub { font-size: 0.75rem; color: var(--mid-gray); }
      .bars { display: flex; align-items: flex-end; gap: 8px; height: 140px; margin-top: 16px; }
      .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 6px; height: 100%; }
      .bar-fill { width: 100%; max-width: 26px; background: linear-gradient(180deg, var(--blue-mid), var(--blue)); border-radius: 6px 6px 0 0; transition: height 0.4s var(--ease); }
      .bar-label { font-size: 0.68rem; color: var(--mid-gray); }
      .role-switch-banner {
        display: none; align-items: center; gap: 10px; padding: 10px 16px; margin-bottom: 16px;
        background: var(--green-light); color: var(--green-dark); border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 600;
      }
    </style>
  </head>
  <body class="glass-app">
    <div class="glass-mesh"><span></span><span></span><span></span></div>

    <div class="glass-shell">
      <aside class="glass-sidebar glass">
        <a class="glass-brand" href="dashboard.html">
          <div class="glass-brand-mark"><img src="/assets/logo.png" onerror="this.style.display='none'" /></div>
          <div class="glass-brand-words"><strong>Perfections Dental</strong><small>Superadmin</small></div>
        </a>
        <a class="glass-nav-link active" href="dashboard.html"><i class="fas fa-gauge"></i> Dashboard</a>
        <a class="glass-nav-link" href="doctors.html"><i class="fas fa-user-doctor"></i> Doctors</a>
        <a class="glass-nav-link" href="nurses.html"><i class="fas fa-user-nurse"></i> Nurses</a>
        <a class="glass-nav-link" href="reception.html"><i class="fas fa-bell-concierge"></i> Reception Staff</a>
        <a class="glass-nav-link" href="services.html"><i class="fas fa-tooth"></i> Services</a>
        <a class="glass-nav-link" href="inventory.html"><i class="fas fa-boxes-stacked"></i> Inventory</a>
        <a class="glass-nav-link" href="financial.html"><i class="fas fa-sack-dollar"></i> Financial</a>
        <a class="glass-nav-link" href="analytics.html"><i class="fas fa-chart-pie"></i> Analytics</a>
        <a class="glass-nav-link" href="performance.html"><i class="fas fa-ranking-star"></i> Performance</a>
        <a class="glass-nav-link" href="access-control.html"><i class="fas fa-shield-halved"></i> Access Control</a>
        <a class="glass-nav-link" href="settings.html"><i class="fas fa-gear"></i> Settings</a>
        <div style="flex:1"></div>
        <a class="glass-nav-link" href="profile.html"><i class="fas fa-user"></i> Profile</a>
        <a class="glass-nav-link" id="logoutBtn" href="#"><i class="fas fa-right-from-bracket"></i> Sign Out</a>
      </aside>

      <main class="glass-main">
        <div class="page-head">
          <h1 id="greeting">Welcome back</h1>
          <span class="glass-badge info" id="todayBadge"></span>
        </div>

        <div class="glass-grid glass-grid-4" style="margin-bottom:22px;">
          <div class="glass-card glass-stat">
            <div class="glass-stat-icon"><i class="fas fa-users"></i></div>
            <div><div class="glass-stat-num" id="statStaff">–</div><div class="glass-stat-label">Total Staff</div></div>
          </div>
          <div class="glass-card glass-stat">
            <div class="glass-stat-icon green"><i class="fas fa-tooth"></i></div>
            <div><div class="glass-stat-num" id="statPatients">–</div><div class="glass-stat-label">Total Patients</div></div>
          </div>
          <div class="glass-card glass-stat">
            <div class="glass-stat-icon gold"><i class="fas fa-sack-dollar"></i></div>
            <div><div class="glass-stat-num" id="statRevenue">–</div><div class="glass-stat-label">Monthly Revenue</div></div>
          </div>
          <div class="glass-card glass-stat">
            <div class="glass-stat-icon red"><i class="fas fa-triangle-exclamation"></i></div>
            <div><div class="glass-stat-num" id="statLowStock">–</div><div class="glass-stat-label">Low Stock Alerts</div></div>
          </div>
        </div>

        <div class="glass-grid glass-grid-2">
          <div class="glass-card">
            <h3><i class="fas fa-chart-column"></i> Revenue — Last 7 Days</h3>
            <div class="bars" id="revenueBars"></div>
          </div>
          <div class="glass-card">
            <h3><i class="fas fa-timeline"></i> Recent Activity</h3>
            <div id="activityList" style="margin-top:10px;"></div>
          </div>
        </div>
      </main>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script>
      const API = '/api';
      async function api(path) {
        const res = await fetch(API + path, { credentials: 'include' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        return data;
      }

      document.getElementById('logoutBtn').addEventListener('click', async (e) => {
        e.preventDefault();
        await logout();
      });

      const activityIcon = {
        patient_registration: 'fa-user-plus',
        payment: 'fa-credit-card',
        low_stock: 'fa-triangle-exclamation',
        staff_registration: 'fa-user-check',
      };

      async function init() {
        const user = await checkAuth();
        if (!user) return;
        document.getElementById('greeting').textContent = `Welcome back, ${user.first_name}`;
        document.getElementById('todayBadge').innerHTML =
          `<i class="fas fa-calendar"></i> ${new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}`;

        try {
          const { stats } = await api('/superadmin/dashboard/stats');
          document.getElementById('statStaff').textContent = stats.total_staff ?? 0;
          document.getElementById('statPatients').textContent = stats.total_patients ?? 0;
          document.getElementById('statRevenue').textContent = '₦' + (stats.monthly_revenue ?? 0).toLocaleString();
          document.getElementById('statLowStock').textContent = stats.low_stock_alerts ?? 0;
        } catch (e) { console.error(e); }

        try {
          const { activities } = await api('/superadmin/dashboard/activities?limit=6');
          const list = document.getElementById('activityList');
          list.innerHTML = activities.length ? activities.map(a => `
            <div class="list-row">
              <div style="width:34px;height:34px;border-radius:10px;background:#eaf4ff;color:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <i class="fas ${activityIcon[a.type] || 'fa-circle-info'}"></i>
              </div>
              <div style="flex:1">
                <div class="list-row-title">${a.title}</div>
                <div class="list-row-sub">${a.created_at || ''}</div>
              </div>
              <span class="glass-badge ${a.badge_type || 'info'}">${a.badge_text || ''}</span>
            </div>
          `).join('') : '<div class="glass-empty"><i class="fas fa-timeline"></i>No recent activity</div>';
        } catch (e) {
          document.getElementById('activityList').innerHTML = '<div class="glass-empty"><i class="fas fa-timeline"></i>No recent activity</div>';
        }

        try {
          const { revenue_data } = await api('/dashboard/chart-data');
          const values = revenue_data.values.slice(-7);
          const labels = revenue_data.labels.slice(-7);
          const max = Math.max(...values, 1);
          document.getElementById('revenueBars').innerHTML = values.map((v, i) => `
            <div class="bar-col">
              <div class="bar-fill" style="height:${Math.max((v / max) * 100, 3)}%"></div>
              <div class="bar-label">${labels[i]}</div>
            </div>
          `).join('');
        } catch (e) { console.error(e); }
      }

      init();
    </script>
  </body>
</html>
