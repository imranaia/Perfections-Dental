<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Patients — Perfections Dental</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/glass.css" />
    <style>
      .page-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
      .page-head h1 { font-family: var(--font-display); font-size: 1.4rem; color: var(--blue-dark); margin: 0; }
      .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
      .avatar-md { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg,var(--blue),var(--blue-mid)); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; flex-shrink: 0; }
      .close-modal-btn { background: none; border: none; font-size: 1.2rem; color: var(--mid-gray); cursor: pointer; }
      .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
      .pager { display: flex; gap: 8px; align-items: center; justify-content: center; margin-top: 18px; }
      .pager button { padding: 7px 14px; border-radius: var(--radius-sm); border: 1px solid var(--light-border); background: rgba(255,255,255,0.5); cursor: pointer; }
      .pager button:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
  </head>
  <body class="glass-app">
    <div class="glass-mesh"><span></span><span></span><span></span></div>

    <div class="glass-shell">
      <aside class="glass-sidebar glass">
        <a class="glass-brand" href="dashboard.html">
          <div class="glass-brand-mark"><img src="/assets/logo.png" onerror="this.style.display='none'" /></div>
          <div class="glass-brand-words"><strong>Perfections Dental</strong><small>Reception</small></div>
        </a>
        <a class="glass-nav-link" href="dashboard.html"><i class="fas fa-gauge"></i> Dashboard</a>
        <a class="glass-nav-link" href="appointments.html"><i class="fas fa-calendar-days"></i> Appointments</a>
        <a class="glass-nav-link active" href="patients.html"><i class="fas fa-users"></i> Patients</a>
        <a class="glass-nav-link" href="prescriptions.html"><i class="fas fa-pills"></i> Prescriptions</a>
        <a class="glass-nav-link" href="invoices.html"><i class="fas fa-file-invoice"></i> Invoices</a>
        <a class="glass-nav-link" href="payments.html"><i class="fas fa-credit-card"></i> Payments</a>
        <a class="glass-nav-link" href="inventory.html"><i class="fas fa-boxes-stacked"></i> Inventory</a>
        <a class="glass-nav-link" href="services.html"><i class="fas fa-tooth"></i> Services</a>
        <a class="glass-nav-link" href="reports.html"><i class="fas fa-chart-line"></i> Reports</a>
        <div style="flex:1"></div>
        <a class="glass-nav-link" href="profile.html"><i class="fas fa-user"></i> Profile</a>
        <a class="glass-nav-link" id="logoutBtn" href="#"><i class="fas fa-right-from-bracket"></i> Sign Out</a>
      </aside>

      <main class="glass-main">
        <div class="page-head">
          <h1>Patients</h1>
          <button class="glass-btn glass-btn-primary" id="newPatientBtn"><i class="fas fa-user-plus"></i> New Patient</button>
        </div>

        <div class="glass-grid glass-grid-4" style="margin-bottom:20px;">
          <div class="glass-card glass-stat"><div class="glass-stat-icon"><i class="fas fa-users"></i></div><div><div class="glass-stat-num" id="statTotal">–</div><div class="glass-stat-label">Total Patients</div></div></div>
          <div class="glass-card glass-stat"><div class="glass-stat-icon green"><i class="fas fa-user-plus"></i></div><div><div class="glass-stat-num" id="statNew">–</div><div class="glass-stat-label">New This Month</div></div></div>
          <div class="glass-card glass-stat"><div class="glass-stat-icon gold"><i class="fas fa-calendar-check"></i></div><div><div class="glass-stat-num" id="statActive">–</div><div class="glass-stat-label">Active (30 days)</div></div></div>
          <div class="glass-card glass-stat"><div class="glass-stat-icon red"><i class="fas fa-file-invoice-dollar"></i></div><div><div class="glass-stat-num" id="statPending">–</div><div class="glass-stat-label">Pending Payments</div></div></div>
        </div>

        <div class="toolbar">
          <input type="text" id="searchInput" class="glass-input" placeholder="Search name, phone, patient #…" style="width:280px;" />
          <select id="statusFilter" class="glass-select" style="width:auto;">
            <option value="all">All</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
            <option value="new">New (30 days)</option>
          </select>
        </div>

        <div class="glass-card">
          <div class="glass-table-wrap">
            <table class="glass-table">
              <thead><tr><th>Patient</th><th>Age/Gender</th><th>Phone</th><th>Last Visit</th><th>Balance</th><th>Status</th><th></th></tr></thead>
              <tbody id="patientRows"></tbody>
            </table>
          </div>
          <div class="pager" id="pager"></div>
        </div>
      </main>
    </div>

    <!-- New/Edit Patient Modal -->
    <div class="glass-modal-backdrop" id="modalBackdrop" style="display:none;">
      <div class="glass-modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
          <h3 style="margin:0;" id="modalTitle"><i class="fas fa-user-plus"></i> New Patient</h3>
          <button class="close-modal-btn" id="closeModalBtn"><i class="fas fa-xmark"></i></button>
        </div>
        <input type="hidden" id="editPatientId" />
        <div class="form-row-2">
          <div class="glass-field"><label>First name</label><input id="f_first_name" class="glass-input" /></div>
          <div class="glass-field"><label>Last name</label><input id="f_last_name" class="glass-input" /></div>
        </div>
        <div class="form-row-2">
          <div class="glass-field"><label>Date of birth</label><input type="date" id="f_dob" class="glass-input" /></div>
          <div class="glass-field"><label>Gender</label>
            <select id="f_gender" class="glass-select"><option value="Female">Female</option><option value="Male">Male</option></select>
          </div>
        </div>
        <div class="form-row-2">
          <div class="glass-field"><label>Phone</label><input id="f_phone" class="glass-input" /></div>
          <div class="glass-field"><label>Email</label><input type="email" id="f_email" class="glass-input" /></div>
        </div>
        <div class="glass-field"><label>Address</label><input id="f_address" class="glass-input" /></div>
        <div class="form-row-2">
          <div class="glass-field"><label>Emergency contact name</label><input id="f_ec_name" class="glass-input" /></div>
          <div class="glass-field"><label>Emergency contact phone</label><input id="f_ec_phone" class="glass-input" /></div>
        </div>
        <div class="glass-field"><label>Allergies</label><input id="f_allergies" class="glass-input" placeholder="e.g. Penicillin, None" /></div>
        <div class="glass-field"><label>Chronic conditions</label><input id="f_chronic" class="glass-input" /></div>
        <div class="glass-field"><label>Current medications</label><input id="f_meds" class="glass-input" /></div>
        <button class="glass-btn glass-btn-primary" id="saveBtn" style="width:100%;"><i class="fas fa-check"></i> Save Patient</button>
        <div id="formMessage" style="margin-top:10px; font-size:0.85rem;"></div>
      </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script>
      const API = '/api/reception/patients';
      async function api(path, options = {}) {
        const res = await fetch(API + path, {
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          ...options,
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        return data;
      }

      document.getElementById('logoutBtn').addEventListener('click', async (e) => { e.preventDefault(); await logout(); });

      let page = 1;

      async function loadStats() {
        const { stats } = await api('/stats');
        document.getElementById('statTotal').textContent = stats.total ?? 0;
        document.getElementById('statNew').textContent = stats.new_this_month ?? 0;
        document.getElementById('statActive').textContent = stats.active ?? 0;
        document.getElementById('statPending').textContent = stats.with_pending_payments ?? 0;
      }

      async function loadPatients() {
        const search = document.getElementById('searchInput').value;
        const status = document.getElementById('statusFilter').value;
        const params = new URLSearchParams({ page, per_page: 10, status });
        if (search) params.set('search', search);
        const data = await api(`/?${params}`);
        const rows = document.getElementById('patientRows');
        rows.innerHTML = data.patients.length ? data.patients.map(p => `
          <tr>
            <td>
              <div style="display:flex; align-items:center; gap:10px;">
                <div class="avatar-md">${p.initials}</div>
                <div><div style="font-weight:700;">${p.full_name}</div><div style="font-size:0.75rem;color:var(--mid-gray);">${p.patient_number}</div></div>
              </div>
            </td>
            <td>${p.age ?? '—'} / ${p.gender || '—'}</td>
            <td>${p.phone || '—'}</td>
            <td>${p.last_visit}</td>
            <td>${p.pending_amount ? '₦' + p.pending_amount.toLocaleString() : '—'}</td>
            <td><span class="glass-badge ${p.status === 'active' ? 'success' : 'neutral'}">${p.status_display}</span></td>
            <td>
              <button class="glass-btn glass-btn-ghost edit-btn" data-id="${p.id}" style="padding:6px 12px;"><i class="fas fa-pen"></i></button>
              <button class="glass-btn glass-btn-danger del-btn" data-id="${p.id}" style="padding:6px 12px;"><i class="fas fa-trash"></i></button>
            </td>
          </tr>
        `).join('') : '<tr><td colspan="7" style="text-align:center;color:var(--mid-gray);padding:30px;">No patients found</td></tr>';

        document.getElementById('pager').innerHTML = `
          <button ${page <= 1 ? 'disabled' : ''} id="prevPage"><i class="fas fa-chevron-left"></i></button>
          <span style="font-size:0.85rem;color:var(--mid-gray);">Page ${data.page} of ${data.total_pages}</span>
          <button ${page >= data.total_pages ? 'disabled' : ''} id="nextPage"><i class="fas fa-chevron-right"></i></button>`;
        document.getElementById('prevPage')?.addEventListener('click', () => { page--; loadPatients(); });
        document.getElementById('nextPage')?.addEventListener('click', () => { page++; loadPatients(); });

        rows.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', () => openEdit(btn.dataset.id)));
        rows.querySelectorAll('.del-btn').forEach(btn => btn.addEventListener('click', () => deletePatient(btn.dataset.id)));
      }

      async function deletePatient(id) {
        if (!confirm('Delete or deactivate this patient?')) return;
        try {
          const res = await api(`/${id}`, { method: 'DELETE' });
          alert(res.message);
          loadPatients();
        } catch (e) { alert(e.message); }
      }

      const modal = document.getElementById('modalBackdrop');
      function resetForm() {
        ['first_name', 'last_name', 'dob', 'phone', 'email', 'address', 'ec_name', 'ec_phone', 'allergies', 'chronic', 'meds']
          .forEach(f => document.getElementById('f_' + f).value = '');
        document.getElementById('editPatientId').value = '';
      }

      document.getElementById('newPatientBtn').addEventListener('click', () => {
        resetForm();
        document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-plus"></i> New Patient';
        modal.style.display = 'flex';
      });
      document.getElementById('closeModalBtn').addEventListener('click', () => { modal.style.display = 'none'; });

      async function openEdit(id) {
        const { patient: p } = await api(`/${id}`);
        resetForm();
        document.getElementById('editPatientId').value = id;
        document.getElementById('f_first_name').value = p.first_name;
        document.getElementById('f_last_name').value = p.last_name;
        document.getElementById('f_phone').value = p.phone || '';
        document.getElementById('f_email').value = p.email || '';
        document.getElementById('f_address').value = p.address || '';
        document.getElementById('f_ec_name').value = p.emergency_contact?.name || '';
        document.getElementById('f_ec_phone').value = p.emergency_contact?.phone || '';
        document.getElementById('f_allergies').value = p.medical_history?.allergies || '';
        document.getElementById('f_chronic').value = p.medical_history?.chronic_conditions || '';
        document.getElementById('f_meds').value = p.medical_history?.current_medications || '';
        document.getElementById('modalTitle').innerHTML = '<i class="fas fa-pen"></i> Edit Patient';
        modal.style.display = 'flex';
      }

      document.getElementById('saveBtn').addEventListener('click', async () => {
        const msg = document.getElementById('formMessage');
        const id = document.getElementById('editPatientId').value;
        const payload = {
          first_name: document.getElementById('f_first_name').value.trim(),
          last_name: document.getElementById('f_last_name').value.trim(),
          dob: document.getElementById('f_dob').value,
          gender: document.getElementById('f_gender').value,
          phone: document.getElementById('f_phone').value.trim(),
          email: document.getElementById('f_email').value.trim(),
          address: document.getElementById('f_address').value.trim(),
          emergency_contact_name: document.getElementById('f_ec_name').value.trim(),
          emergency_contact_phone: document.getElementById('f_ec_phone').value.trim(),
          allergies: document.getElementById('f_allergies').value.trim(),
          chronic_conditions: document.getElementById('f_chronic').value.trim(),
          current_medications: document.getElementById('f_meds').value.trim(),
        };
        try {
          if (id) {
            await api(`/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
          } else {
            await api('/', { method: 'POST', body: JSON.stringify(payload) });
          }
          msg.style.color = 'var(--green-dark)';
          msg.textContent = 'Saved!';
          setTimeout(() => { modal.style.display = 'none'; msg.textContent = ''; loadPatients(); loadStats(); }, 600);
        } catch (e) {
          msg.style.color = 'var(--danger)';
          msg.textContent = e.message;
        }
      });

      document.getElementById('searchInput').addEventListener('input', () => { page = 1; debounced(); });
      document.getElementById('statusFilter').addEventListener('change', () => { page = 1; loadPatients(); });
      let t;
      function debounced() { clearTimeout(t); t = setTimeout(loadPatients, 300); }

      async function init() {
        const user = await checkAuth();
        if (!user) return;
        await Promise.all([loadStats(), loadPatients()]);
      }
      init();
    </script>
  </body>
</html>
