<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Invoices — Perfections Dental</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/glass.css" />
    <style>
      .page-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
      .page-head h1 { font-family: var(--font-display); font-size: 1.4rem; color: var(--blue-dark); margin: 0; }
      .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
      .close-modal-btn { background: none; border: none; font-size: 1.2rem; color: var(--mid-gray); cursor: pointer; }
      .pager { display: flex; gap: 8px; align-items: center; justify-content: center; margin-top: 18px; }
      .pager button { padding: 7px 14px; border-radius: var(--radius-sm); border: 1px solid var(--light-border); background: rgba(255,255,255,0.5); cursor: pointer; }
      .pager button:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
  </head>
  <body class="glass-app">
    <div class="glass-mesh"><span></span><span></span><span></span></div>

    <div class="glass-shell">
      <aside class="glass-sidebar glass">
        <a class="glass-brand" href="dashboard.html">
          <div class="glass-brand-mark"><img src="/assets/logo.png" onerror="this.style.display='none'" /></div>
          <div class="glass-brand-words"><strong>Perfections Dental</strong><small>Services Limited</small></div>
        </a>
        <a class="glass-nav-link" href="dashboard.html"><i class="fas fa-gauge"></i> Dashboard</a>
        <a class="glass-nav-link" href="appointments.html"><i class="fas fa-calendar-days"></i> Appointments</a>
        <a class="glass-nav-link" href="patients.html"><i class="fas fa-users"></i> Patients</a>
        <a class="glass-nav-link" href="prescriptions.html"><i class="fas fa-pills"></i> Prescriptions</a>
        <a class="glass-nav-link active" href="invoices.html"><i class="fas fa-file-invoice"></i> Invoices</a>
        <a class="glass-nav-link" href="payments.html"><i class="fas fa-credit-card"></i> Payments</a>
        <a class="glass-nav-link" href="inventory.html"><i class="fas fa-boxes-stacked"></i> Inventory</a>
        <a class="glass-nav-link" href="services.html"><i class="fas fa-tooth"></i> Services</a>
        <a class="glass-nav-link" href="reports.html"><i class="fas fa-chart-line"></i> Reports</a>
        <div style="flex:1"></div>
        <a class="glass-nav-link" href="profile.html"><i class="fas fa-user"></i> Profile</a>
        <a class="glass-nav-link" id="logoutBtn" href="#"><i class="fas fa-right-from-bracket"></i> Sign Out</a>
      </aside>

      <main class="glass-main">
        <div class="page-head"><h1>Invoices</h1></div>

        <div class="glass-grid glass-grid-4" style="margin-bottom:20px;">
          <div class="glass-card glass-stat"><div class="glass-stat-icon"><i class="fas fa-file-invoice"></i></div><div><div class="glass-stat-num" id="statTotal">–</div><div class="glass-stat-label">Total Invoices</div></div></div>
          <div class="glass-card glass-stat"><div class="glass-stat-icon green"><i class="fas fa-circle-check"></i></div><div><div class="glass-stat-num" id="statToday">–</div><div class="glass-stat-label">Today's Invoices</div></div></div>
          <div class="glass-card glass-stat"><div class="glass-stat-icon gold"><i class="fas fa-sack-dollar"></i></div><div><div class="glass-stat-num" id="statMonthRevenue">–</div><div class="glass-stat-label">This Month Revenue</div></div></div>
          <div class="glass-card glass-stat"><div class="glass-stat-icon red"><i class="fas fa-hourglass-half"></i></div><div><div class="glass-stat-num" id="statOutstanding">–</div><div class="glass-stat-label">Outstanding</div></div></div>
        </div>

        <div class="toolbar">
          <input type="text" id="searchInput" class="glass-input" placeholder="Search patient or invoice #…" style="width:260px;" />
          <select id="statusFilter" class="glass-select" style="width:auto;">
            <option value="all">All Status</option>
            <option value="unpaid">Unpaid</option>
            <option value="partial">Partial</option>
            <option value="paid">Paid</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>

        <div class="glass-card">
          <div class="glass-table-wrap">
            <table class="glass-table">
              <thead><tr><th>Invoice #</th><th>Patient</th><th>Date</th><th>Total</th><th>Paid</th><th>Status</th><th></th></tr></thead>
              <tbody id="invoiceRows"></tbody>
            </table>
          </div>
          <div class="pager" id="pager"></div>
        </div>
      </main>
    </div>

    <div class="glass-modal-backdrop" id="modalBackdrop" style="display:none;">
      <div class="glass-modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
          <h3 style="margin:0;"><i class="fas fa-credit-card"></i> Record Payment</h3>
          <button class="close-modal-btn" id="closeModalBtn"><i class="fas fa-xmark"></i></button>
        </div>
        <input type="hidden" id="payInvoiceId" />
        <div id="invoiceDetail" style="margin-bottom:16px; font-size:0.88rem;"></div>
        <div class="glass-field"><label>Amount</label><input type="number" id="payAmount" class="glass-input" /></div>
        <div class="glass-field"><label>Method</label>
          <select id="payMethod" class="glass-select">
            <option value="cash">Cash</option><option value="card">Card</option>
            <option value="transfer">Transfer</option><option value="insurance">Insurance</option>
          </select>
        </div>
        <button class="glass-btn glass-btn-success" id="payBtn" style="width:100%;"><i class="fas fa-check"></i> Record Payment</button>
        <div id="payMessage" style="margin-top:10px; font-size:0.85rem;"></div>
      </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script>
      const API = '/api/reception/invoices';
      async function api(path, options = {}) {
        const res = await fetch(API + path, {
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          ...options,
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        return data;
      }

      document.getElementById('logoutBtn').addEventListener('click', async (e) => { e.preventDefault(); await logout(); });

      let page = 1;

      async function loadStats() {
        const { stats } = await api('/stats');
        document.getElementById('statTotal').textContent = stats.total_invoices ?? 0;
        document.getElementById('statToday').textContent = stats.today_count ?? 0;
        document.getElementById('statMonthRevenue').textContent = '₦' + (stats.this_month_revenue ?? 0).toLocaleString();
        document.getElementById('statOutstanding').textContent = '₦' + (stats.outstanding ?? 0).toLocaleString();
      }

      async function loadInvoices() {
        const search = document.getElementById('searchInput').value;
        const status = document.getElementById('statusFilter').value;
        const params = new URLSearchParams({ page, per_page: 10, status });
        if (search) params.set('search', search);
        const data = await api(`/?${params}`);
        const rows = document.getElementById('invoiceRows');
        rows.innerHTML = data.invoices.length ? data.invoices.map(inv => `
          <tr>
            <td>${inv.number}</td>
            <td>${inv.patient || '—'}</td>
            <td>${inv.date}</td>
            <td>₦${(inv.amount ?? 0).toLocaleString()}</td>
            <td>₦${(inv.amount_paid ?? 0).toLocaleString()}</td>
            <td><span class="glass-badge ${inv.status === 'Paid' ? 'success' : inv.status === 'Cancelled' ? 'neutral' : 'warning'}">${inv.status}</span></td>
            <td>${inv.status !== 'Paid' && inv.status !== 'Cancelled' ? `<button class="glass-btn glass-btn-primary pay-btn" data-id="${inv.id}" data-balance="${inv.balance ?? 0}" style="padding:6px 14px;"><i class="fas fa-credit-card"></i> Pay</button>` : ''}</td>
          </tr>
        `).join('') : '<tr><td colspan="7" style="text-align:center;color:var(--mid-gray);padding:30px;">No invoices found</td></tr>';

        document.getElementById('pager').innerHTML = `
          <button ${page <= 1 ? 'disabled' : ''} id="prevPage"><i class="fas fa-chevron-left"></i></button>
          <span style="font-size:0.85rem;color:var(--mid-gray);">Page ${data.page} of ${data.total_pages}</span>
          <button ${page >= data.total_pages ? 'disabled' : ''} id="nextPage"><i class="fas fa-chevron-right"></i></button>`;
        document.getElementById('prevPage')?.addEventListener('click', () => { page--; loadInvoices(); });
        document.getElementById('nextPage')?.addEventListener('click', () => { page++; loadInvoices(); });

        rows.querySelectorAll('.pay-btn').forEach(btn => {
          btn.addEventListener('click', () => openPay(btn.dataset.id, btn.dataset.balance));
        });
      }

      const modal = document.getElementById('modalBackdrop');
      function openPay(id, balance) {
        document.getElementById('payInvoiceId').value = id;
        document.getElementById('payAmount').value = balance;
        document.getElementById('invoiceDetail').innerHTML = `Outstanding balance: <strong>₦${Number(balance).toLocaleString()}</strong>`;
        modal.style.display = 'flex';
      }
      document.getElementById('closeModalBtn').addEventListener('click', () => { modal.style.display = 'none'; });

      document.getElementById('payBtn').addEventListener('click', async () => {
        const msg = document.getElementById('payMessage');
        const id = document.getElementById('payInvoiceId').value;
        try {
          await api(`/${id}/payment`, {
            method: 'POST',
            body: JSON.stringify({
              amount: Number(document.getElementById('payAmount').value),
              payment_method: document.getElementById('payMethod').value,
            }),
          });
          msg.style.color = 'var(--green-dark)';
          msg.textContent = 'Payment recorded!';
          setTimeout(() => { modal.style.display = 'none'; msg.textContent = ''; loadInvoices(); loadStats(); }, 700);
        } catch (e) {
          msg.style.color = 'var(--danger)';
          msg.textContent = e.message;
        }
      });

      document.getElementById('searchInput').addEventListener('input', () => { page = 1; debounced(); });
      document.getElementById('statusFilter').addEventListener('change', () => { page = 1; loadInvoices(); });
      let t;
      function debounced() { clearTimeout(t); t = setTimeout(loadInvoices, 300); }

      async function init() {
        const user = await checkAuth();
        if (!user) return;
        await Promise.all([loadStats(), loadInvoices()]);
      }
      init();
    </script>
  </body>
</html>
