<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Payments — Perfections Dental</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/glass.css" />
    <style>
      .page-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
      .page-head h1 { font-family: var(--font-display); font-size: 1.4rem; color: var(--blue-dark); margin: 0; }
      .list-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--light-border); }
      .list-row:last-child { border-bottom: none; }
      .close-modal-btn { background: none; border: none; font-size: 1.2rem; color: var(--mid-gray); cursor: pointer; }
      .bill-line { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.86rem; border-bottom: 1px dashed var(--light-border); }
      .bill-total-line { display: flex; justify-content: space-between; padding: 8px 0; font-weight: 700; }
    </style>
  </head>
  <body class="glass-app">
    <div class="glass-mesh"><span></span><span></span><span></span></div>

    <div class="glass-shell">
      <aside class="glass-sidebar glass">
        <a class="glass-brand" href="dashboard.html">
          <div class="glass-brand-mark"><img src="/assets/logo.png" onerror="this.style.display='none'" /></div>
          <div class="glass-brand-words"><strong>Perfections Dental</strong><small>Services Limited</small></div>
        </a>
        <a class="glass-nav-link" href="dashboard.html"><i class="fas fa-gauge"></i> Dashboard</a>
        <a class="glass-nav-link" href="appointments.html"><i class="fas fa-calendar-days"></i> Appointments</a>
        <a class="glass-nav-link" href="patients.html"><i class="fas fa-users"></i> Patients</a>
        <a class="glass-nav-link" href="prescriptions.html"><i class="fas fa-pills"></i> Prescriptions</a>
        <a class="glass-nav-link" href="invoices.html"><i class="fas fa-file-invoice"></i> Invoices</a>
        <a class="glass-nav-link active" href="payments.html"><i class="fas fa-credit-card"></i> Payments</a>
        <a class="glass-nav-link" href="inventory.html"><i class="fas fa-boxes-stacked"></i> Inventory</a>
        <a class="glass-nav-link" href="services.html"><i class="fas fa-tooth"></i> Services</a>
        <a class="glass-nav-link" href="reports.html"><i class="fas fa-chart-line"></i> Reports</a>
        <div style="flex:1"></div>
        <a class="glass-nav-link" href="profile.html"><i class="fas fa-user"></i> Profile</a>
        <a class="glass-nav-link" id="logoutBtn" href="#"><i class="fas fa-right-from-bracket"></i> Sign Out</a>
      </aside>

      <main class="glass-main">
        <div class="page-head"><h1>Payments</h1></div>

        <div class="glass-grid glass-grid-4" style="margin-bottom:20px;">
          <div class="glass-card glass-stat"><div class="glass-stat-icon"><i class="fas fa-receipt"></i></div><div><div class="glass-stat-num" id="statTransactions">–</div><div class="glass-stat-label">Transactions Today</div></div></div>
          <div class="glass-card glass-stat"><div class="glass-stat-icon green"><i class="fas fa-sack-dollar"></i></div><div><div class="glass-stat-num" id="statRevenue">–</div><div class="glass-stat-label">Today's Revenue</div></div></div>
          <div class="glass-card glass-stat"><div class="glass-stat-icon gold"><i class="fas fa-ticket"></i></div><div><div class="glass-stat-num" id="statAvg">–</div><div class="glass-stat-label">Avg. Ticket</div></div></div>
          <div class="glass-card glass-stat"><div class="glass-stat-icon red"><i class="fas fa-hourglass-half"></i></div><div><div class="glass-stat-num" id="statPending">–</div><div class="glass-stat-label">Awaiting Billing</div></div></div>
        </div>

        <div class="glass-grid glass-grid-2">
          <div class="glass-card">
            <h3><i class="fas fa-hourglass-half"></i> Awaiting Billing</h3>
            <div id="pendingList" style="margin-top:10px;"></div>
          </div>
          <div class="glass-card">
            <h3><i class="fas fa-clock-rotate-left"></i> Recent Payments</h3>
            <div id="recentList" style="margin-top:10px;"></div>
          </div>
        </div>
      </main>
    </div>

    <div class="glass-modal-backdrop" id="modalBackdrop" style="display:none;">
      <div class="glass-modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
          <h3 style="margin:0;"><i class="fas fa-file-invoice-dollar"></i> Bill &amp; Collect Payment</h3>
          <button class="close-modal-btn" id="closeModalBtn"><i class="fas fa-xmark"></i></button>
        </div>
        <div id="billDetail"></div>
        <div class="glass-field" style="margin-top:14px;">
          <label>Payment method</label>
          <select id="payMethod" class="glass-select">
            <option value="cash">Cash</option><option value="pos">POS / Card</option>
            <option value="transfer">Bank Transfer</option><option value="cheque">Cheque</option>
          </select>
        </div>
        <button class="glass-btn glass-btn-success" id="confirmPayBtn" style="width:100%;"><i class="fas fa-check"></i> Confirm Payment</button>
        <div id="payMessage" style="margin-top:10px; font-size:0.85rem;"></div>
      </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script>
      const API = '/api/reception/payments';
      async function api(path, options = {}) {
        const res = await fetch(API + path, {
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          ...options,
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        return data;
      }

      document.getElementById('logoutBtn').addEventListener('click', async (e) => { e.preventDefault(); await logout(); });

      async function loadStats() {
        const { stats } = await api('/stats');
        document.getElementById('statTransactions').textContent = stats.total_transactions ?? 0;
        document.getElementById('statRevenue').textContent = '₦' + (stats.today_revenue ?? 0).toLocaleString();
        document.getElementById('statAvg').textContent = '₦' + Math.round(stats.avg_ticket ?? 0).toLocaleString();
      }

      async function loadPending() {
        const { patients } = await api('/patients/pending');
        document.getElementById('statPending').textContent = patients.length;
        const list = document.getElementById('pendingList');
        list.innerHTML = patients.length ? patients.map(p => `
          <div class="list-row">
            <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-mid));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.78rem;flex-shrink:0;">${p.initials}</div>
            <div style="flex:1">
              <div style="font-weight:700;font-size:0.86rem;">${p.name} ${p.is_new ? '<span class="glass-badge success">New</span>' : ''}</div>
              <div style="font-size:0.76rem;color:var(--mid-gray);">${p.services}</div>
            </div>
            <button class="glass-btn glass-btn-primary bill-btn" data-appt="${p.appointment_id}" style="padding:7px 14px;"><i class="fas fa-file-invoice-dollar"></i> Bill</button>
          </div>
        `).join('') : '<div class="glass-empty"><i class="fas fa-check-circle"></i>Nothing awaiting billing</div>';

        list.querySelectorAll('.bill-btn').forEach(btn => btn.addEventListener('click', () => openBill(btn.dataset.appt)));
      }

      async function loadRecent() {
        const { payments } = await api('/recent');
        const list = document.getElementById('recentList');
        list.innerHTML = payments.length ? payments.map(p => `
          <div class="list-row">
            <div style="flex:1">
              <div style="font-weight:700;font-size:0.86rem;">${p.patient_name}</div>
              <div style="font-size:0.76rem;color:var(--mid-gray);">${p.payment_method || ''} · ${p.time_ago || p.created_at || ''}</div>
            </div>
            <div style="font-weight:700;color:var(--green-dark);">₦${(p.amount ?? 0).toLocaleString()}</div>
          </div>
        `).join('') : '<div class="glass-empty"><i class="fas fa-receipt"></i>No payments yet</div>';
      }

      const modal = document.getElementById('modalBackdrop');
      let currentAppointmentId = null;

      async function openBill(appointmentId) {
        currentAppointmentId = appointmentId;
        const { bill } = await api(`/bill/${appointmentId}`);
        const allItems = [...bill.services, ...bill.medications];
        document.getElementById('billDetail').innerHTML = `
          <div style="font-weight:700;margin-bottom:8px;">${bill.patient_name} · ${bill.patient_number}</div>
          ${allItems.map(i => `<div class="bill-line"><span>${i.description}</span><span>₦${Number(i.line_total ?? i.total ?? 0).toLocaleString()}</span></div>`).join('')}
          <div class="bill-line"><span>Subtotal</span><span>₦${bill.subtotal.toLocaleString()}</span></div>
          <div class="bill-line"><span>Tax (${bill.tax_percent}%)</span><span>₦${bill.tax.toLocaleString()}</span></div>
          <div class="bill-total-line"><span>Total</span><span>₦${bill.total.toLocaleString()}</span></div>
        `;
        modal.style.display = 'flex';
      }
      document.getElementById('closeModalBtn').addEventListener('click', () => { modal.style.display = 'none'; });

      document.getElementById('confirmPayBtn').addEventListener('click', async () => {
        const msg = document.getElementById('payMessage');
        try {
          await api('/process', {
            method: 'POST',
            body: JSON.stringify({
              appointment_id: Number(currentAppointmentId),
              payment_method: document.getElementById('payMethod').value,
            }),
          });
          msg.style.color = 'var(--green-dark)';
          msg.textContent = 'Payment processed!';
          setTimeout(() => {
            modal.style.display = 'none'; msg.textContent = '';
            loadStats(); loadPending(); loadRecent();
          }, 700);
        } catch (e) {
          msg.style.color = 'var(--danger)';
          msg.textContent = e.message;
        }
      });

      async function init() {
        const user = await checkAuth();
        if (!user) return;
        await Promise.all([loadStats(), loadPending(), loadRecent()]);
      }
      init();
    </script>
  </body>
</html>
