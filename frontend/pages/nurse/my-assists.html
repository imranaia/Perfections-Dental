<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>My Assists — Perfections Dental</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/glass.css" />
    <style>
      .page-head h1 { font-family: var(--font-display); font-size: 1.4rem; color: var(--blue-dark); margin: 0 0 20px; }
      .assist-row { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--light-border); }
      .assist-row:last-child { border-bottom: none; }
      .avatar-sm { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg,var(--blue),var(--blue-mid)); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.78rem; flex-shrink: 0; }
    </style>
  </head>
  <body class="glass-app">
    <div class="glass-mesh"><span></span><span></span><span></span></div>

    <div class="glass-shell">
      <aside class="glass-sidebar glass">
        <a class="glass-brand" href="dashboard.html">
          <div class="glass-brand-mark"><img src="/assets/logo.png" onerror="this.style.display='none'" /></div>
          <div class="glass-brand-words"><strong>Perfections Dental</strong><small>Nurse</small></div>
        </a>
        <a class="glass-nav-link" href="dashboard.html"><i class="fas fa-gauge"></i> Dashboard</a>
        <a class="glass-nav-link" href="my-tasks.html"><i class="fas fa-list-check"></i> My Tasks</a>
        <a class="glass-nav-link active" href="my-assists.html"><i class="fas fa-hand-holding-medical"></i> My Assists</a>
        <a class="glass-nav-link" href="procedures.html"><i class="fas fa-syringe"></i> Procedures</a>
        <a class="glass-nav-link" href="prescribe.html"><i class="fas fa-pills"></i> Prescribe</a>
        <a class="glass-nav-link" href="notes.html"><i class="fas fa-notes-medical"></i> Notes & Vitals</a>
        <a class="glass-nav-link" href="records.html"><i class="fas fa-file-waveform"></i> Records</a>
        <div style="flex:1"></div>
        <a class="glass-nav-link" href="profile.html"><i class="fas fa-user"></i> Profile</a>
        <a class="glass-nav-link" id="logoutBtn" href="#"><i class="fas fa-right-from-bracket"></i> Sign Out</a>
      </aside>

      <main class="glass-main">
        <div class="page-head"><h1>My Assists</h1></div>

        <div class="glass-grid glass-grid-4" style="margin-bottom:20px;">
          <div class="glass-card glass-stat"><div class="glass-stat-icon"><i class="fas fa-hand-holding-medical"></i></div><div><div class="glass-stat-num" id="statTotal">–</div><div class="glass-stat-label">Total</div></div></div>
          <div class="glass-card glass-stat"><div class="glass-stat-icon gold"><i class="fas fa-hourglass-half"></i></div><div><div class="glass-stat-num" id="statPending">–</div><div class="glass-stat-label">Pending</div></div></div>
          <div class="glass-card glass-stat"><div class="glass-stat-icon green"><i class="fas fa-check-circle"></i></div><div><div class="glass-stat-num" id="statCompleted">–</div><div class="glass-stat-label">Completed</div></div></div>
          <div class="glass-card glass-stat"><div class="glass-stat-icon"><i class="fas fa-user-doctor"></i></div><div><div class="glass-stat-num" id="statDoctors">–</div><div class="glass-stat-label">Doctors Assisted</div></div></div>
        </div>

        <div class="glass-card"><div id="assistList"></div></div>
      </main>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script>
      const API = '/api/nurse/assists';
      async function api(path, options = {}) {
        const res = await fetch(API + path, {
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          ...options,
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        return data;
      }

      document.getElementById('logoutBtn').addEventListener('click', async (e) => { e.preventDefault(); await logout(); });

      async function loadAssists() {
        const data = await api('/');
        document.getElementById('statTotal').textContent = data.stats.total_assists ?? 0;
        document.getElementById('statPending').textContent = data.stats.pending_assists ?? 0;
        document.getElementById('statCompleted').textContent = data.stats.completed_assists ?? 0;
        document.getElementById('statDoctors').textContent = data.stats.unique_doctors ?? 0;

        const list = document.getElementById('assistList');
        list.innerHTML = data.assists.length ? data.assists.map(a => `
          <div class="assist-row">
            <div class="avatar-sm">${(a.patient_name || '??').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()}</div>
            <div style="flex:1">
              <div style="font-weight:700;">${a.patient_name || ''}</div>
              <div style="font-size:0.78rem;color:var(--mid-gray);">Dr. ${a.doctor_name || ''} · ${a.procedure || 'Consultation'} · ${a.appointment_time || ''}</div>
            </div>
            <span class="glass-badge ${a.status === 'completed' ? 'success' : 'info'}">${a.status}</span>
            ${a.status !== 'completed' ? `<button class="glass-btn glass-btn-ghost complete-btn" data-id="${a.assist_id}" style="padding:6px 14px;">Complete</button>` : ''}
          </div>
        `).join('') : '<div class="glass-empty"><i class="fas fa-hand-holding-medical"></i>No assists yet</div>';

        list.querySelectorAll('.complete-btn').forEach(btn => {
          btn.addEventListener('click', () => completeAssist(btn.dataset.id));
        });
      }

      async function completeAssist(id) {
        try {
          await api(`/${id}/complete`, { method: 'PUT', body: JSON.stringify({ notes: '' }) });
          loadAssists();
        } catch (e) { alert(e.message); }
      }

      async function init() {
        const user = await checkAuth();
        if (!user) return;
        await loadAssists();
      }
      init();
    </script>
  </body>
</html>
