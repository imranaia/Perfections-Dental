<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>My Tasks — Perfections Dental</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/glass.css" />
    <style>
      .page-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
      .page-head h1 { font-family: var(--font-display); font-size: 1.4rem; color: var(--blue-dark); margin: 0; }
      .filter-tabs { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
      .filter-tabs button { padding: 8px 16px; border-radius: var(--radius-pill); border: 1.5px solid var(--light-border); background: rgba(255,255,255,0.5); font-size: 0.8rem; font-weight: 700; color: var(--mid-gray); cursor: pointer; }
      .filter-tabs button.active { background: var(--blue); color: #fff; border-color: var(--blue); }
      .task-row { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--light-border); }
      .task-row:last-child { border-bottom: none; }
      .priority-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
      .priority-high { background: var(--danger); } .priority-medium { background: var(--gold); } .priority-low { background: var(--green); }
    </style>
  </head>
  <body class="glass-app">
    <div class="glass-mesh"><span></span><span></span><span></span></div>

    <div class="glass-shell">
      <aside class="glass-sidebar glass">
        <a class="glass-brand" href="dashboard.html">
          <div class="glass-brand-mark"><img src="/assets/logo.png" onerror="this.style.display='none'" /></div>
          <div class="glass-brand-words"><strong>Perfections Dental</strong><small>Nurse</small></div>
        </a>
        <a class="glass-nav-link" href="dashboard.html"><i class="fas fa-gauge"></i> Dashboard</a>
        <a class="glass-nav-link active" href="my-tasks.html"><i class="fas fa-list-check"></i> My Tasks</a>
        <a class="glass-nav-link" href="my-assists.html"><i class="fas fa-hand-holding-medical"></i> My Assists</a>
        <a class="glass-nav-link" href="procedures.html"><i class="fas fa-syringe"></i> Procedures</a>
        <a class="glass-nav-link" href="prescribe.html"><i class="fas fa-pills"></i> Prescribe</a>
        <a class="glass-nav-link" href="notes.html"><i class="fas fa-notes-medical"></i> Notes & Vitals</a>
        <a class="glass-nav-link" href="records.html"><i class="fas fa-file-waveform"></i> Records</a>
        <div style="flex:1"></div>
        <a class="glass-nav-link" href="profile.html"><i class="fas fa-user"></i> Profile</a>
        <a class="glass-nav-link" id="logoutBtn" href="#"><i class="fas fa-right-from-bracket"></i> Sign Out</a>
      </aside>

      <main class="glass-main">
        <div class="page-head"><h1>My Tasks</h1></div>

        <div class="glass-grid glass-grid-4" style="margin-bottom:20px;">
          <div class="glass-card glass-stat"><div class="glass-stat-icon"><i class="fas fa-list"></i></div><div><div class="glass-stat-num" id="statTotal">–</div><div class="glass-stat-label">Total</div></div></div>
          <div class="glass-card glass-stat"><div class="glass-stat-icon gold"><i class="fas fa-hourglass-half"></i></div><div><div class="glass-stat-num" id="statPending">–</div><div class="glass-stat-label">Pending</div></div></div>
          <div class="glass-card glass-stat"><div class="glass-stat-icon red"><i class="fas fa-triangle-exclamation"></i></div><div><div class="glass-stat-num" id="statUrgent">–</div><div class="glass-stat-label">Urgent</div></div></div>
          <div class="glass-card glass-stat"><div class="glass-stat-icon green"><i class="fas fa-check-circle"></i></div><div><div class="glass-stat-num" id="statCompleted">–</div><div class="glass-stat-label">Completed</div></div></div>
        </div>

        <div class="filter-tabs" id="filterTabs">
          <button class="active" data-f="all">All</button>
          <button data-f="pending">Pending</button>
          <button data-f="in_progress">In Progress</button>
          <button data-f="completed">Completed</button>
        </div>

        <div class="glass-card"><div id="taskList"></div></div>
      </main>
    </div>

    <script src="/js/auth.js"></script>
    <script>
      const API = '/api/nurse/tasks';
      async function api(path, options = {}) {
        const res = await fetch(API + path, {
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          ...options,
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        return data;
      }

      document.getElementById('logoutBtn').addEventListener('click', async (e) => { e.preventDefault(); await logout(); });

      let currentFilter = 'all';

      async function loadStats() {
        const { stats } = await api('/stats');
        document.getElementById('statTotal').textContent = stats.total ?? 0;
        document.getElementById('statPending').textContent = stats.pending ?? 0;
        document.getElementById('statUrgent').textContent = stats.urgent ?? 0;
        document.getElementById('statCompleted').textContent = stats.completed ?? 0;
      }

      async function loadTasks() {
        const params = currentFilter !== 'all' ? `?filter=${currentFilter}` : '';
        const { tasks } = await api('/' + params);
        const list = document.getElementById('taskList');
        list.innerHTML = tasks.length ? tasks.map(t => `
          <div class="task-row">
            <span class="priority-dot priority-${t.priority || 'medium'}"></span>
            <div style="flex:1">
              <div style="font-weight:700;">${t.task_name}</div>
              <div style="font-size:0.78rem;color:var(--mid-gray);">${t.description || ''} ${t.due_date ? '· Due ' + t.due_date : ''}</div>
            </div>
            <span class="glass-badge ${t.status === 'completed' ? 'success' : t.status === 'in_progress' ? 'info' : 'warning'}">${t.status}</span>
            ${t.status !== 'completed' ? `<button class="glass-btn glass-btn-ghost next-btn" data-id="${t.id}" data-next="${t.status === 'pending' ? 'in_progress' : 'completed'}" style="padding:6px 14px;">${t.status === 'pending' ? 'Start' : 'Complete'}</button>` : ''}
          </div>
        `).join('') : '<div class="glass-empty"><i class="fas fa-list-check"></i>No tasks here</div>';

        list.querySelectorAll('.next-btn').forEach(btn => {
          btn.addEventListener('click', () => updateStatus(btn.dataset.id, btn.dataset.next));
        });
      }

      async function updateStatus(id, status) {
        try {
          await api(`/${id}/status`, { method: 'PUT', body: JSON.stringify({ status }) });
          loadTasks(); loadStats();
        } catch (e) { alert(e.message); }
      }

      document.getElementById('filterTabs').addEventListener('click', (e) => {
        if (e.target.tagName !== 'BUTTON') return;
        document.querySelectorAll('#filterTabs button').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentFilter = e.target.dataset.f;
        loadTasks();
      });

      async function init() {
        const user = await checkAuth();
        if (!user) return;
        await Promise.all([loadStats(), loadTasks()]);
      }
      init();
    </script>
  </body>
</html>
