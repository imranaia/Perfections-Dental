<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Consultation — Perfections Dental</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/glass.css" />
    <style>
      .page-head h1 { font-family: var(--font-display); font-size: 1.4rem; color: var(--blue-dark); margin: 0 0 20px; }
      .patient-pick-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer; }
      .patient-pick-row:hover { background: rgba(4,80,160,0.06); }
      .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
    </style>
  </head>
  <body class="glass-app">
    <div class="glass-mesh"><span></span><span></span><span></span></div>

    <div class="glass-shell">
      <aside class="glass-sidebar glass">
        <a class="glass-brand" href="dashboard.html">
          <div class="glass-brand-mark"><img src="/assets/logo.png" onerror="this.style.display='none'" /></div>
          <div class="glass-brand-words"><strong>Perfections Dental</strong><small>Doctor</small></div>
        </a>
        <a class="glass-nav-link" href="dashboard.html"><i class="fas fa-gauge"></i> Dashboard</a>
        <a class="glass-nav-link" href="schedule.html"><i class="fas fa-calendar-days"></i> Schedule</a>
        <a class="glass-nav-link" href="my-patients.html"><i class="fas fa-users"></i> My Patients</a>
        <a class="glass-nav-link active" href="consult.html"><i class="fas fa-stethoscope"></i> Consultation</a>
        <a class="glass-nav-link" href="prescribe.html"><i class="fas fa-pills"></i> Prescribe</a>
        <a class="glass-nav-link" href="records.html"><i class="fas fa-file-waveform"></i> Records</a>
        <a class="glass-nav-link" href="my-reports.html"><i class="fas fa-chart-line"></i> Reports</a>
        <div style="flex:1"></div>
        <a class="glass-nav-link" href="profile.html"><i class="fas fa-user"></i> Profile</a>
        <a class="glass-nav-link" id="logoutBtn" href="#"><i class="fas fa-right-from-bracket"></i> Sign Out</a>
      </aside>

      <main class="glass-main">
        <div class="page-head"><h1>Consultation</h1></div>

        <div class="glass-card" id="pickerCard">
          <h3><i class="fas fa-user"></i> Search Patient to Consult</h3>
          <div class="glass-field" style="margin-top:12px;"><input type="text" id="searchInput" class="glass-input" placeholder="Search patient by name, number, or phone…" /></div>
          <div id="searchResults"></div>
        </div>

        <div class="glass-card" id="consultForm" style="display:none; margin-top:20px;">
          <div id="patientBanner" style="margin-bottom:16px;"></div>

          <div class="glass-field"><label>Presenting Complaint</label><textarea id="f_complaint" class="glass-textarea"></textarea></div>
          <div class="glass-field"><label>History</label><textarea id="f_history" class="glass-textarea"></textarea></div>
          <div class="form-row-2">
            <div class="glass-field"><label>Extra-oral Examination</label><textarea id="f_eoe" class="glass-textarea"></textarea></div>
            <div class="glass-field"><label>Intra-oral Examination</label><textarea id="f_ioe" class="glass-textarea"></textarea></div>
          </div>
          <div class="glass-field"><label>Diagnosis</label><textarea id="f_diagnosis" class="glass-textarea"></textarea></div>
          <div class="glass-field"><label>Treatment Plan</label><textarea id="f_treatment_plan" class="glass-textarea"></textarea></div>
          <div class="glass-field"><label>Treatment Done Today</label><textarea id="f_treatment_done" class="glass-textarea"></textarea></div>
          <div class="glass-field"><label>Review Date (optional)</label><input type="date" id="f_review_date" class="glass-input" /></div>

          <div style="display:flex; gap:10px; margin-top:16px;">
            <button class="glass-btn glass-btn-ghost" id="saveBtn"><i class="fas fa-floppy-disk"></i> Save Draft</button>
            <button class="glass-btn glass-btn-primary" id="completeBtn"><i class="fas fa-check-double"></i> Complete Consultation</button>
          </div>
          <div id="formMessage" style="margin-top:12px; font-size:0.85rem;"></div>
        </div>
      </main>
    </div>

    <script src="/js/auth.js"></script>
    <script>
      const API = '/api/doctor/consult';
      async function api(path, options = {}) {
        const res = await fetch(API + path, {
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          ...options,
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        return data;
      }

      document.getElementById('logoutBtn').addEventListener('click', async (e) => { e.preventDefault(); await logout(); });

      let currentPatient = null;

      let t;
      document.getElementById('searchInput').addEventListener('input', (e) => {
        clearTimeout(t);
        t = setTimeout(() => search(e.target.value), 250);
      });

      async function search(q) {
        if (!q) { document.getElementById('searchResults').innerHTML = ''; return; }
        const res = await fetch(`/api/doctor/records/search?q=${encodeURIComponent(q)}`, { credentials: 'include' });
        const { patients } = await res.json();
        document.getElementById('searchResults').innerHTML = patients.map(p => `
          <div class="patient-pick-row" data-id="${p.id}" data-name="${p.full_name}">
            <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-mid));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.78rem;">${(p.full_name || '??').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()}</div>
            <div><div style="font-weight:700;">${p.full_name}</div><div style="font-size:0.75rem;color:var(--mid-gray);">${p.patient_number}</div></div>
          </div>
        `).join('') || '<div class="glass-empty"><i class="fas fa-user"></i>No matches</div>';

        document.querySelectorAll('#searchResults [data-id]').forEach(row => {
          row.addEventListener('click', () => selectPatient(row.dataset.id, row.dataset.name));
        });
      }

      async function selectPatient(id, name) {
        const { patient: p } = await api(`/patient/${id}`);
        currentPatient = { id: Number(id), name, appointment_id: p.existing_appointment_id || null };
        document.getElementById('patientBanner').innerHTML = `
          <div class="glass-badge success" style="font-size:0.85rem; padding:8px 16px;"><i class="fas fa-user-check"></i> Consulting: ${p.full_name} · ${p.patient_number}</div>`;
        document.getElementById('consultForm').style.display = 'block';
        ['complaint', 'history', 'eoe', 'ioe', 'diagnosis', 'treatment_plan', 'treatment_done'].forEach(f => document.getElementById('f_' + f).value = '');
      }

      function buildPayload() {
        return {
          patient_id: currentPatient.id,
          appointment_id: currentPatient.appointment_id,
          presenting_complain: document.getElementById('f_complaint').value.trim(),
          history: document.getElementById('f_history').value.trim(),
          eoe: document.getElementById('f_eoe').value.trim(),
          ioe: document.getElementById('f_ioe').value.trim(),
          diagnosis: document.getElementById('f_diagnosis').value.trim(),
          treatment_plan: document.getElementById('f_treatment_plan').value.trim(),
          treatment_done: document.getElementById('f_treatment_done').value.trim(),
          review_date: document.getElementById('f_review_date').value || null,
        };
      }

      document.getElementById('saveBtn').addEventListener('click', async () => {
        const msg = document.getElementById('formMessage');
        try {
          await api('/save', { method: 'POST', body: JSON.stringify(buildPayload()) });
          msg.style.color = 'var(--green-dark)';
          msg.textContent = 'Draft saved.';
        } catch (e) {
          msg.style.color = 'var(--danger)';
          msg.textContent = e.message;
        }
      });

      document.getElementById('completeBtn').addEventListener('click', async () => {
        const msg = document.getElementById('formMessage');
        try {
          await api('/complete', { method: 'POST', body: JSON.stringify(buildPayload()) });
          msg.style.color = 'var(--green-dark)';
          msg.textContent = 'Consultation completed!';
          setTimeout(() => { document.getElementById('consultForm').style.display = 'none'; currentPatient = null; }, 900);
        } catch (e) {
          msg.style.color = 'var(--danger)';
          msg.textContent = e.message;
        }
      });

      async function init() {
        const user = await checkAuth();
        if (!user) return;
      }
      init();
    </script>
  </body>
</html>
