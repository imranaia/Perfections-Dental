<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Schedule — Perfections Dental</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/glass.css" />
    <style>
      .page-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
      .page-head h1 { font-family: var(--font-display); font-size: 1.4rem; color: var(--blue-dark); margin: 0; }
      .timeline-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--light-border); }
      .timeline-item:last-child { border-bottom: none; }
      .timeline-time { width: 70px; font-weight: 700; color: var(--blue); font-size: 0.85rem; }
      .avatar-circle { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg,var(--blue),var(--blue-mid)); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; }
    </style>
  </head>
  <body class="glass-app">
    <div class="glass-mesh"><span></span><span></span><span></span></div>

    <div class="glass-shell">
      <aside class="glass-sidebar glass">
        <a class="glass-brand" href="dashboard.html">
          <div class="glass-brand-mark"><img src="/assets/logo.png" onerror="this.style.display='none'" /></div>
          <div class="glass-brand-words"><strong>Perfections Dental</strong><small>Services Limited</small></div>
        </a>
        <a class="glass-nav-link" href="dashboard.html"><i class="fas fa-gauge"></i> Dashboard</a>
        <a class="glass-nav-link active" href="schedule.html"><i class="fas fa-calendar-days"></i> Schedule</a>
        <a class="glass-nav-link" href="my-patients.html"><i class="fas fa-users"></i> My Patients</a>
        <a class="glass-nav-link" href="consult.html"><i class="fas fa-stethoscope"></i> Consultation</a>
        <a class="glass-nav-link" href="prescribe.html"><i class="fas fa-pills"></i> Prescribe</a>
        <a class="glass-nav-link" href="records.html"><i class="fas fa-file-waveform"></i> Records</a>
        <a class="glass-nav-link" href="my-reports.html"><i class="fas fa-chart-line"></i> Reports</a>
        <div style="flex:1"></div>
        <a class="glass-nav-link" href="profile.html"><i class="fas fa-user"></i> Profile</a>
        <a class="glass-nav-link" id="logoutBtn" href="#"><i class="fas fa-right-from-bracket"></i> Sign Out</a>
      </aside>

      <main class="glass-main">
        <div class="page-head">
          <h1>Schedule</h1>
          <input type="date" id="dateFilter" class="glass-input" style="width:auto;" />
        </div>

        <div class="glass-grid glass-grid-4" style="margin-bottom:20px;">
          <div class="glass-card glass-stat"><div class="glass-stat-icon"><i class="fas fa-list"></i></div><div><div class="glass-stat-num" id="statTotal">–</div><div class="glass-stat-label">Total</div></div></div>
          <div class="glass-card glass-stat"><div class="glass-stat-icon gold"><i class="fas fa-hourglass-half"></i></div><div><div class="glass-stat-num" id="statWaiting">–</div><div class="glass-stat-label">Waiting</div></div></div>
          <div class="glass-card glass-stat"><div class="glass-stat-icon"><i class="fas fa-person-walking"></i></div><div><div class="glass-stat-num" id="statInProgress">–</div><div class="glass-stat-label">In Progress</div></div></div>
          <div class="glass-card glass-stat"><div class="glass-stat-icon green"><i class="fas fa-check-circle"></i></div><div><div class="glass-stat-num" id="statCompleted">–</div><div class="glass-stat-label">Completed</div></div></div>
        </div>

        <div class="glass-card">
          <div id="scheduleList"></div>
        </div>
      </main>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script>
      const API = '/api/doctor/schedule';
      async function api(path, options = {}) {
        const res = await fetch(API + path, {
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          ...options,
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        return data;
      }

      document.getElementById('logoutBtn').addEventListener('click', async (e) => { e.preventDefault(); await logout(); });

      function today() { return new Date().toISOString().slice(0, 10); }
      document.getElementById('dateFilter').value = today();

      async function loadSchedule() {
        const date = document.getElementById('dateFilter').value;
        const data = await api(`/?date=${date}`);
        document.getElementById('statTotal').textContent = data.summary.total ?? 0;
        document.getElementById('statWaiting').textContent = data.summary.waiting ?? 0;
        document.getElementById('statInProgress').textContent = data.summary.in_progress ?? 0;
        document.getElementById('statCompleted').textContent = data.summary.completed ?? 0;

        const list = document.getElementById('scheduleList');
        list.innerHTML = data.appointments.length ? data.appointments.map(a => `
          <div class="timeline-item">
            <div class="timeline-time">${a.time || a.start_time || ''}</div>
            <div class="avatar-circle">${(a.patient_name || '??').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()}</div>
            <div style="flex:1">
              <div style="font-weight:700;">${a.patient_name || ''}</div>
              <div style="font-size:0.78rem;color:var(--mid-gray);">${a.type || a.service || 'Consultation'}</div>
            </div>
            <span class="glass-badge info">${a.status}</span>
            ${a.status !== 'completed' && a.status !== 'cancelled' ? `<button class="glass-btn glass-btn-ghost status-btn" data-id="${a.id}" data-next="${nextStatus(a.status)}" style="padding:6px 12px;">${nextLabel(a.status)}</button>` : ''}
          </div>
        `).join('') : '<div class="glass-empty"><i class="fas fa-calendar-check"></i>No appointments for this date</div>';

        list.querySelectorAll('.status-btn').forEach(btn => {
          btn.addEventListener('click', () => updateStatus(btn.dataset.id, btn.dataset.next));
        });
      }

      function nextStatus(s) {
        return { scheduled: 'checked_in', checked_in: 'waiting', waiting: 'in_progress', in_progress: 'completed' }[s] || 'completed';
      }
      function nextLabel(s) {
        return { scheduled: 'Check In', checked_in: 'To Waiting', waiting: 'Start', in_progress: 'Complete' }[s] || 'Update';
      }

      async function updateStatus(id, status) {
        try {
          await api(`/appointment/${id}/status`, { method: 'PUT', body: JSON.stringify({ status }) });
          loadSchedule();
        } catch (e) { alert(e.message); }
      }

      document.getElementById('dateFilter').addEventListener('change', loadSchedule);

      async function init() {
        const user = await checkAuth();
        if (!user) return;
        await loadSchedule();
      }
      init();
    </script>
  </body>
</html>
